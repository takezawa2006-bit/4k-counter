name: 4Kデータ毎日更新

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 06:00 JST (UTC 21:00)
  workflow_dispatch:         # 手動実行も可能

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存関係インストール
        run: pip install -r requirements.txt

      - name: J-Quants からデータ取得
        env:
          JQUANTS_EMAIL:    ${{ secrets.JQUANTS_EMAIL }}
          JQUANTS_PASSWORD: ${{ secrets.JQUANTS_PASSWORD }}
        run: python fetch_data.py

      - name: data.json をコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: 4Kデータ自動更新 $(date -u '+%Y-%m-%d')"
          git push
